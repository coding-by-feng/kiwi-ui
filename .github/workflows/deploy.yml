name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: PROD

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 16
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VUE_APP_API_URL: https://kason.app

      - name: Compress dist
        run: tar -czf dist.tar.gz -C dist .

      - name: Copy dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: dist.tar.gz
          target: /tmp

      - name: Deploy to Docker container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            docker exec kiwi-ui rm -rf /usr/share/nginx/html/*
            docker cp /tmp/dist.tar.gz kiwi-ui:/tmp/dist.tar.gz
            docker exec kiwi-ui tar -xzf /tmp/dist.tar.gz -C /usr/share/nginx/html
            docker exec kiwi-ui rm -f /tmp/dist.tar.gz
            rm -f /tmp/dist.tar.gz
